<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>网页梗化器测试页</title>
  </head>
  <body>
    <main>
      <h1 id="title">这是严肃的网页标题了</h1>
      <p id="mixed">正常的文字 <strong>加粗的文字了</strong></p>
      <pre id="code">代码里的文字不应该变了</pre>
      <input id="input" value="输入框里的文字不应该变了">
      <img id="image" src="https://example.com/original.png" srcset="https://example.com/original@2x.png 2x" sizes="100vw" alt="原图">
      <picture>
        <source id="source" srcset="https://example.com/source.webp" type="image/webp">
        <img id="pictureImage" src="https://example.com/picture.png" alt="picture">
      </picture>
      <video id="video" poster="https://example.com/poster.png"></video>
      <section id="dynamic"></section>
    </main>
  </body>
</html>
